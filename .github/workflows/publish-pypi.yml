# Upload wheels and sdists for planframe, planframe-polars, planframe-pandas, planframe-sparkless.
#
# PyPI: enable "Trusted publishing" for each project (same GitHub repo + this workflow),
# or publish locally with: UV_PUBLISH_TOKEN=pypi-... uv publish "dist/*"
# https://docs.pypi.org/trusted-publishers/

name: Publish to PyPI

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and upload to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build distributions
        run: bash scripts/build-dist.sh

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
