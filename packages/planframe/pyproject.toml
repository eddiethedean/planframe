 [build-system]
 requires = ["hatchling>=1.25"]
 build-backend = "hatchling.build"
 
 [project]
name = "planframe"
 version = "0.1.0"
 description = "Core typed relational planning layer for Python DataFrames."
 readme = "README.md"
 requires-python = ">=3.10"
 license = { text = "MIT" }
 authors = [{ name = "PlanFrame Contributors" }]
 dependencies = [
   "typing-extensions>=4.8",
   "pydantic>=1.10",
 ]
 
 [project.urls]
 Repository = "https://example.invalid/planframe"
 
 [tool.hatch.build.targets.wheel]
 packages = ["planframe"]
 
