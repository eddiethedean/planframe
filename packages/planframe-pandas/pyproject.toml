 [build-system]
 requires = ["hatchling>=1.25"]
 build-backend = "hatchling.build"
 
 [project]
 name = "planframe-pandas"
version = "1.2.0"
 description = "pandas backend adapter for PlanFrame."
 readme = "README.md"
 requires-python = ">=3.10"
 license = { text = "MIT" }
 authors = [{ name = "PlanFrame Contributors" }]
 classifiers = [
   "Programming Language :: Python :: 3",
   "Programming Language :: Python :: 3 :: Only",
   "Programming Language :: Python :: 3.10",
   "License :: OSI Approved :: MIT License",
   "Typing :: Typed",
 ]
 dependencies = [
  "planframe>=1.2.0,<2.0.0",
   "pandas>=2.0",
 ]
 
 [project.optional-dependencies]
 parquet = ["pyarrow>=14"]
 excel = ["openpyxl>=3.1"]
 
 [project.urls]
 Repository = "https://github.com/eddiethedean/planframe"
Documentation = "https://planframe.readthedocs.io/en/latest/planframe_pandas/"
 Issues = "https://github.com/eddiethedean/planframe/issues"
 
 [tool.hatch.build.targets.wheel]
 packages = ["planframe_pandas"]
 
