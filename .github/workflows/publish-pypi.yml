# Upload wheels and sdists for planframe, planframe-polars, planframe-pandas, planframe-sparkless.
#
# PyPI: enable "Trusted publishing" for each project (same GitHub repo + this workflow),
# or publish locally with: UV_PUBLISH_TOKEN=pypi-... uv publish "dist/*"
# https://docs.pypi.org/trusted-publishers/

name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Lint, typecheck, tests, docs, wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dev environment (uv.lock)
        run: uv sync --all-extras --group dev

      # Root lockfile names the workspace meta-package `planframe`; install real packages as editables.
      - name: Install workspace packages (editable)
        run: |
          uv pip install -e packages/planframe \
            -e packages/planframe-polars \
            -e packages/planframe-pandas \
            -e packages/planframe-sparkless

      - name: Ruff
        run: .venv/bin/ruff check packages/planframe packages/planframe-polars packages/planframe-pandas packages/planframe-sparkless scripts tests

      - name: ty
        run: .venv/bin/ty check

      - name: Pytest
        run: .venv/bin/pytest -q

      - name: MkDocs (strict)
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
        run: .venv/bin/mkdocs build --strict

      - name: Build wheels (smoke)
        run: |
          mkdir -p dist-ci
          uv build packages/planframe --wheel --out-dir dist-ci
          uv build packages/planframe-polars --wheel --out-dir dist-ci
          uv build packages/planframe-pandas --wheel --out-dir dist-ci
          uv build packages/planframe-sparkless --wheel --out-dir dist-ci

  publish:
    name: Build and upload to PyPI
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build distributions
        run: bash scripts/build-dist.sh

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
