[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "planframe-spark"
version = "1.0.0"
description = "PySpark backend adapter for PlanFrame (plus optional Spark-shaped API re-exports)."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "PlanFrame Contributors" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "License :: OSI Approved :: MIT License",
  "Typing :: Typed",
]
dependencies = [
  "planframe>=1.0.0,<2.0.0",
  "pyspark>=3.5",
]

[project.urls]
Repository = "https://github.com/eddiethedean/planframe"
Documentation = "https://planframe.readthedocs.io/en/latest/planframe_spark/"
Issues = "https://github.com/eddiethedean/planframe/issues"

[tool.hatch.build.targets.wheel]
packages = ["planframe_spark"]

